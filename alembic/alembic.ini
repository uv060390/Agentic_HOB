# Alembic configuration for BrandOS
# Run migrations: alembic upgrade head
# Create new migration: alembic revision --autogenerate -m "description"

[alembic]
script_location = alembic
prepend_sys_path = .

# Database URL — overridden at runtime from BRANDOS_DB_URL env var
# (see alembic/env.py)
sqlalchemy.url = postgresql+psycopg://brandos:brandos_dev@localhost:5432/brandos

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
